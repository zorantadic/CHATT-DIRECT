name: Azure Static Web Apps CI/CD

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

jobs:
- job: build_and_deploy_job
  displayName: Build and Deploy Frontend (SWA)
  pool:
    vmImage: ubuntu-latest

  variables:
  - group: Azure-Static-Web-Apps-gray-island-0de03d10f-variable-group

  steps:
  - checkout: self

  - task: AzureStaticWebApp@0
    displayName: Build and Deploy Static Web App
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_ISLAND_0DE03D10F)
      app_location: "frontend"
      api_location: ""
      output_location: "dist"
    env:
      VITE_SPEECH_BASE_URL: $(VITE_SPEECH_BASE_URL)
      VITE_REALTIME_BASE_URL: $(VITE_REALTIME_BASE_URL)
      VITE_ORCHESTRATOR_BASE_URL: $(VITE_ORCHESTRATOR_BASE_URL)
      VITE_MANUAL_BASE_URL: $(VITE_MANUAL_BASE_URL)
